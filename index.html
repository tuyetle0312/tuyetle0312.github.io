<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>rom&nd A/B Test</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>

    body{
      font-family:'Noto Sans KR', sans-serif;
      background:#ffffff;
    }

    .ab-hidden{
      display:none !important;
    }

    .banner{
      background:#f05a67;
      color:white;
      text-align:center;
      padding:10px;
      font-size:13px;
      font-weight:bold;
    }

  </style>

</head>

<body class="pb-32">

<!-- HEADER -->
<header class="flex items-center justify-between p-4 border-b sticky top-0 bg-white z-50">

  <button>
    <i class="fa-solid fa-chevron-left text-xl"></i>
  </button>

  <h1 class="text-xl font-bold">
    rom&nd
  </h1>

  <div class="flex gap-4">

    <i class="fa-solid fa-magnifying-glass text-xl"></i>

    <div class="relative">

      <i class="fa-solid fa-bag-shopping text-xl"></i>

      <span class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] rounded-full px-1">
        2
      </span>

    </div>

  </div>

</header>

<!-- MAIN -->
<main class="max-w-md mx-auto">

  <!-- SALE IMAGE -->
  <img
  id="sale-image"
  src="https://i.imgur.com/aER2vKu.png"
  class="w-full h-auto object-cover"
  alt="sale event">

  <!-- GIFT IMAGE -->
  <img
  id="gift-image"
  src="https://i.imgur.com/N6oi33P.png"
  class="w-full h-auto object-cover ab-hidden"
  alt="gift event">

  <!-- PRODUCT INFO -->
  <div class="p-6">

    <div class="text-[11px] text-gray-400 mb-1">
      BEST SELLER
    </div>

    <h2 class="text-xl font-bold leading-snug">
      [롬앤] 쥬시 래스팅 틴트
    </h2>

    <!-- PRICE -->
    <div class="mt-4 flex items-center gap-3">

      <span id="discount-percent"
      class="text-2xl font-bold text-pink-500">
        20%
      </span>

      <span id="current-price"
      class="text-2xl font-bold">
        10,400원
      </span>

      <span id="original-price"
      class="text-sm text-gray-400 line-through">
        13,000원
      </span>

    </div>

    <!-- SALE VERSION -->
    <div id="sale-box"
    class="mt-5 p-4 bg-gray-50 rounded-xl">

      <p class="font-bold">
        🔥 20% 즉시 할인
      </p>

      <p class="text-xs text-gray-500 mt-1">
        타임세일 이벤트 진행 중
      </p>

    </div>

    <!-- GIFT VERSION -->
    <div id="gift-box"
    class="mt-5 p-4 bg-pink-50 rounded-xl ab-hidden">

      <p class="font-bold text-pink-500">
        🎁 미니 립밤 증정
      </p>

      <p class="text-xs text-gray-500 mt-1">
        랜덤 컬러 1종 증정
      </p>

    </div>

    <!-- PRODUCT FEATURES -->
    <div class="mt-8 border-t pt-6 grid grid-cols-3 gap-2 text-center text-[11px] text-gray-500">

      <div class="flex flex-col items-center gap-2">
        <i class="fa-solid fa-droplet text-lg text-pink-500"></i>
        <span>촉촉한 수분감</span>
      </div>

      <div class="flex flex-col items-center gap-2">
        <i class="fa-solid fa-sun text-lg text-pink-500"></i>
        <span>맑고 투명한 광택</span>
      </div>

      <div class="flex flex-col items-center gap-2">
        <i class="fa-solid fa-feather text-lg text-pink-500"></i>
        <span>가벼운 사용감</span>
      </div>

    </div>

  </div>

</main>

<!-- EVENT BANNER -->
<div class="fixed bottom-[80px] left-0 right-0 max-w-md mx-auto z-40">

  <div class="banner">
    지금 구매하고 특별 혜택 받기 ♥
  </div>

</div>

<!-- BUY BUTTON -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t flex gap-2 max-w-md mx-auto">

  <button class="flex-1 bg-gray-100 py-4 rounded-lg font-bold">
    장바구니
  </button>

  <button onclick="purchase()"
  class="flex-[2] bg-black text-white py-4 rounded-lg font-bold">

    구매하기

  </button>

</div>

<script>

  // RANDOM A/B TEST
  const TEST_MODE = Math.random() < 0.5 ? 'SALE' : 'GIFT';

  function runABTest(mode){

    const saleBox = document.getElementById('sale-box');
    const giftBox = document.getElementById('gift-box');

    const saleImage = document.getElementById('sale-image');
    const giftImage = document.getElementById('gift-image');

    const percent = document.getElementById('discount-percent');
    const currentPrice = document.getElementById('current-price');
    const originalPrice = document.getElementById('original-price');

    // GIFT VERSION
    if(mode === 'GIFT'){

      saleBox.classList.add('ab-hidden');
      giftBox.classList.remove('ab-hidden');

      saleImage.classList.add('ab-hidden');
      giftImage.classList.remove('ab-hidden');

      percent.classList.add('ab-hidden');
      originalPrice.classList.add('ab-hidden');

      currentPrice.innerText = '13,000원';

    }

    // SALE VERSION
    else{

      saleBox.classList.remove('ab-hidden');
      giftBox.classList.add('ab-hidden');

      saleImage.classList.remove('ab-hidden');
      giftImage.classList.add('ab-hidden');

      percent.classList.remove('ab-hidden');
      originalPrice.classList.remove('ab-hidden');

      currentPrice.innerText = '10,400원';

    }

    console.log("현재 테스트 버전:", mode);

  }

  // PURCHASE BUTTON
  function purchase(){

    alert("구매 완료! 현재 버전: " + TEST_MODE);

  }

  // RUN TEST
  runABTest(TEST_MODE);

</script>

</body>
</html>
