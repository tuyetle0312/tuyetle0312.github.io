<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A/B 테스트 실험 페이지</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .product-image {
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .btn-buy {
            background-color: #ff4d4d;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        h1 { font-size: 24px; color: #333; }
        p { color: #666; }
    </style>
</head>
<body>

    <div class="container">
        <h1>로맨드 틴트 특별 기획전</h1>
        <p>지금 구매하시면 특별한 혜택이 기다리고 있습니다!</p>

        <img src="https://imgur.com/9tzTtb9" alt="로맨드 상품 이미지" class="product-image">

        <button class="btn-buy" id="buy-button">지금 바로 구매하기</button>
    </div>

    </body>
</html>
