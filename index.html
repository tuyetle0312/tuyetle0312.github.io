<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>롬앤 립 제품 이벤트</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #fff5f5;
    margin: 0;
    padding: 0;
}

.container {
    padding: 30px;
}

h1 {
    color: #d60000;
    margin-bottom: 20px;
}

.product {
    margin-top: 20px;
}

.product img {
    width: 320px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.price {
    font-size: 22px;
    margin: 20px 0;
}

.old-price {
    text-decoration: line-through;
    color: gray;
    margin-right: 10px;
}

.new-price {
    color: red;
    font-weight: bold;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    background-color: red;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background-color: darkred;
}
</style>

</head>

<body>

<div class="container">
    <h1>롬앤 립 제품 이벤트</h1>

    <div class="product">
        <!-- A/B 테스트 이미지 -->
        <img id="main-image" src="" alt="립 제품 이미지">

        <!-- 가격 정보 -->
        <div class="price">
            <span class="old-price">₩15,000</span>
            →
            <span class="new-price">₩12,750</span>
        </div>

        <!-- 구매 버튼 -->
        <button>구매하기</button>
    </div>
</div>

<script>
// 이미지 2개 (할인 vs 사은품)
var images = [
    "https://files.catbox.moe/5p6n8g.png", // 할인 이미지
    "https://files.catbox.moe/7x9k2m.png"  // 사은품 이미지
];

// 랜덤으로 A/B 테스트 실행
var randomIndex = Math.floor(Math.random() * 2);

// 이미지 적용
document.getElementById("main-image").src = images[randomIndex];
</script>

</body>
</html>
