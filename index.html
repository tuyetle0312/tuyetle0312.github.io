<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>롬앤 립 제품 이벤트</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #fff5f5;
    margin: 0;
}

.container {
    padding: 30px;
}

h1 {
    color: #d60000;
}

img {
    width: 320px;
    margin-top: 20px;
    border-radius: 10px;
}

.price {
    font-size: 22px;
    margin: 20px 0;
}

.old-price {
    text-decoration: line-through;
    color: gray;
}

.new-price {
    color: red;
    font-weight: bold;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    background-color: red;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h1>롬앤 립 제품 이벤트</h1>

    <img id="main-image" src="">

    <div class="price">
        <span class="old-price">₩15,000</span>
        →
        <span class="new-price">₩12,750</span>
    </div>

    <button>구매하기</button>
</div>

<script>
// LINK ẢNH CHUẨN (KHÔNG LỖI)
var images = [
    "https://upload.wikimedia.org/wikipedia/commons/3/3a/Cosmetics_lipstick.jpg",
    "https://upload.wikimedia.org/wikipedia/commons/8/8c/Lipstick.jpg"
];

var randomIndex = Math.floor(Math.random() * 2);

document.getElementById("main-image").src = images[randomIndex];
</script>

</body>
</html>
